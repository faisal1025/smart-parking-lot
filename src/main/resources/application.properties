spring.application.name=SmartParkingLot
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/parkinglotdb?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
# driver is a tool for converting in a language mysql understand
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# dialect is a language
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
springdoc.swagger-ui.path=/docs
per-hour-cost=10.0
